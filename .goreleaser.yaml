# GoReleaser v2 configuration. Docs: https://goreleaser.com
version: 2

project_name: tea-dash

before:
  hooks:
    - go mod tidy

builds:
  - id: tea-dash
    main: .
    binary: tea-dash
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/gbarany/tea-dash/internal/build.Version={{ .Version }}
      - -X github.com/gbarany/tea-dash/internal/build.Commit={{ .ShortCommit }}
      - -X github.com/gbarany/tea-dash/internal/build.Date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
