# GoReleaser v2 configuration. Docs: https://goreleaser.com
version: 2

project_name: tea-dash

before:
  hooks:
    - go mod tidy

builds:
  - id: tea-dash
    main: .
    binary: tea-dash
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/gbarany/tea-dash/internal/build.Version={{ .Version }}
      - -X github.com/gbarany/tea-dash/internal/build.Commit={{ .ShortCommit }}
      - -X github.com/gbarany/tea-dash/internal/build.Date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false

homebrew_casks:
  - name: tea-dash
    repository:
      owner: gbarany
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/gbarany/tea-dash"
    description: "Terminal dashboard for Gitea/Forgejo, in the spirit of gh-dash"
    license: "MIT"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    # The binaries aren't code-signed/notarized, so strip the macOS quarantine
    # bit on install (else Gatekeeper blocks "tea-dash is damaged").
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tea-dash"]
          end
