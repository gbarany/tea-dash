name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "43 7 * * 1" # weekly, Monday 07:43 UTC

permissions:
  contents: read

jobs:
  # govulncheck reports only vulnerabilities in code paths this module
  # actually reaches, so a finding here is actionable, not noise.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: stable
          go-package: ./...

  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3 # v2.27.1
        with:
          # -no-fail: findings surface in the Security tab via SARIF rather
          # than breaking builds; promote to blocking once triaged.
          args: "-no-fail -fmt sarif -out gosec.sarif ./..."

      - uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: gosec.sarif
          category: gosec
