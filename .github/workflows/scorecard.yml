name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1" # weekly, Monday 08:17 UTC

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # SARIF upload
      id-token: write        # publish_results signed publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes to the OpenSSF REST API, which feeds the public badge
          # and report at https://scorecard.dev/viewer/?uri=github.com/gbarany/tea-dash
          publish_results: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: results.sarif
